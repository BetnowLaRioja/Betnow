<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BET NOW - Prode Premium</title>

<!-- PWA: manifest e íconos -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f14">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  /* PALETA PREMIUM TIPO CASA DE APUESTAS */
  :root {
    --bg-app: #0a0f14;       /* Fondo súper oscuro */
    --bg-card: #141b22;      /* Tarjetas grises */
    --border: #212c36;       /* Bordes sutiles */
    --text-main: #ffffff;
    --text-muted: #8b9bb4;
    --accent: #00ff66;       /* Verde Neón estilo B365 */
    --accent-glow: rgba(0, 255, 102, 0.4);
    --gold: #facc15;
  }
  
  * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { width: 100%; min-height: 100vh; margin: 0; padding: 0; background-color: var(--bg-app); color: var(--text-main); overscroll-behavior-y: none; }

  /* CAROUSEL TORNEOS */
  .pozos-titulo { padding: 20px 16px 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 800; }
  .pozos-carrusel { display: flex; gap: 12px; overflow-x: auto; padding: 4px 16px 20px; scroll-snap-type: x mandatory; scrollbar-width: none; }
  .pozos-carrusel::-webkit-scrollbar { display: none; }
  .pozo-slide { scroll-snap-align: center; flex: 0 0 85%; background: linear-gradient(145deg, var(--bg-card), #0d1218); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; }
  .pozo-slide-liga { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .pozo-slide-monto { font-size: 36px; font-weight: 900; color: var(--gold); margin: 8px 0; letter-spacing: -1px; }
  .pozo-slide-cta { font-size: 12px; color: var(--accent); font-weight: 800; text-transform: uppercase; }

  /* FORMULARIO */
  .form-cont { padding: 0 16px 40px; }
  h2 { font-size: 20px; font-weight: 900; text-transform: uppercase; color: var(--text-main); margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
  label { font-size: 12px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; display: block; margin: 16px 0 8px; }
  input[type=text], input[type=email], select { width: 100%; padding: 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: #fff; font-size: 16px; font-weight: 600; outline: none; appearance: none; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  /* PARTIDOS PREMIUM */
  .partido-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 12px 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .equipo { flex: 1; text-align: center; }
  .equipo span { display: block; font-size: 13px; font-weight: 800; color: #fff; margin-top: 6px; }
  .marcador { display: flex; align-items: center; gap: 8px; background: #080b0f; padding: 6px; border-radius: 8px; border: 1px solid var(--border); }
  .marcador input { width: 44px; height: 44px; text-align: center; font-size: 20px; font-weight: 900; border-radius: 6px; border: none; background: #1a222c; color: var(--accent); outline: none; }
  .vs { color: var(--text-muted); font-size: 10px; font-weight: 900; text-transform: uppercase; }

  /* ⚡ BOTÓN NEÓN PREMIUM ⚡ */
  button#enviar {
    width: 100%; padding: 18px; margin-top: 30px; border: none; border-radius: 8px;
    background: var(--accent); color: #000000; font-weight: 900; font-size: 18px;
    text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 0 15px var(--accent-glow);
    transition: all 0.2s ease-in-out;
    position: relative; overflow: hidden;
  }
  /* Efecto al pasar el dedo o tocar */
  button#enviar:hover, button#enviar:active {
    background: #00ff77;
    box-shadow: 0 0 25px var(--accent), 0 0 50px var(--accent-glow);
    transform: scale(1.02);
  }

  /* 🔒 PANTALLA DE BLOQUEO ESTRICTA */
  .gate-overlay {
    position: fixed; z-index: 999999; inset: 0; background: rgba(10,15,20,0.98);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .gate-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
    width: 100%; max-width: 380px; padding: 30px 20px; text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .gate-logo { width: 70px; height: 70px; border-radius: 16px; margin-bottom: 20px; }
  .gate-card h2 { color: var(--text-main); font-size: 20px; font-weight: 900; border: none; margin: 0 0 10px; padding: 0; }
  .gate-card p { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
  .instr-box { background: #080b0f; border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: left; }
  .instr-box .alerta-ig { color: #f43f5e; font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; display: block; }
  .instr-box ol { margin: 0; padding-left: 20px; color: #fff; font-size: 14px; line-height: 1.6; }
  .instr-box strong { color: var(--accent); }

  /* MODAL DE PAGO */
  .modal { display: none; position: fixed; z-index: 9999; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: var(--bg-card); border: 1px solid var(--accent); border-radius: 16px; width: 100%; max-width: 380px; padding: 24px; text-align: center; }
  .alias-box { background: #080b0f; border: 1px dashed var(--accent); border-radius: 8px; padding: 16px; margin: 20px 0; font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
  .btn-whatsapp { display: block; width: 100%; padding: 16px; border-radius: 8px; background: #25D366; color: #fff; font-weight: 900; text-decoration: none; text-transform: uppercase; }

  .oculto { display: none !important; }
</style>
</head>
<body>

  <!-- 🔒 CANDADO ESTRICTO - NO SE PUEDE CERRAR -->
  <div id="gateOverlay" class="gate-overlay oculto">
    <div class="gate-card">
      <img src="icon-192.png" class="gate-logo" alt="Logo">
      <h2>APLICACIÓN REQUERIDA</h2>
      <p>Por seguridad y rendimiento, BET NOW solo funciona como aplicación nativa instalada en tu dispositivo.</p>
      
      <div id="instrucciones" class="instr-box">
        <!-- El JS inyecta las instrucciones correctas acá -->
      </div>
    </div>
  </div>

  <!-- CONTENIDO APP -->
  <div id="appContent" class="oculto">
    <div class="pozos-titulo">PREMIOS ESTIMADOS</div>
    <div class="pozos-carrusel" id="carrusel">Cargando torneos...</div>

    <div class="form-cont">
      <h2>BET NOW PRODE</h2>
      <label>Nombre Completo</label>
      <input type="text" id="nombre" placeholder="Ingresá tu nombre">

      <label>Email de jugador</label>
      <input type="email" id="email" placeholder="correo@ejemplo.com">

      <label>Seleccionar Liga</label>
      <select id="torneo"><option value="">Elegí un torneo...</option></select>

      <div id="partidos"></div>

      <div id="desempate-cont" class="oculto">
        <label>Goles totales de la fecha (Desempate)</label>
        <input type="text" id="desempate" placeholder="Ej: 15">
      </div>

      <button id="enviar" class="oculto">Confirmar Jugada</button>
      <div id="estado" style="margin-top:16px; text-align:center; font-weight:800; color:#f43f5e;"></div>
    </div>
  </div>

  <!-- MODAL DE PAGO -->
  <div id="pagoModal" class="modal">
    <div class="modal-content">
      <h2 style="border:none; margin:0; color:var(--text-main);">¡JUGADA REGISTRADA!</h2>
      <p style="color:var(--text-muted); font-size:14px; margin-top:10px;">Aboná la inscripción para validar tu ticket.</p>
      <div class="alias-box" id="modalAlias">ALIAS.PENDIENTE</div>
      <a id="wpLink" href="#" target="_blank" class="btn-whatsapp">Enviar Comprobante</a>
    </div>
  </div>

<script>
  // ================= CONFIGURACIÓN =================
  const SCRIPT_URL = "PEGAR_ACA_TU_URL_DE_APPS_SCRIPT_TERMINADA_EN_/exec";
  const WHATSAPP_NUMERO = "5493825662396";
  const ALIAS_PAGO = "ALIAS.DE.TU.CUENTA";
  // =================================================

  const formatoARS = (n) => '$' + Math.round(n).toLocaleString('es-AR');

  // LÓGICA DE BLOQUEO ESTRICTO
  function estaEnApp() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  function evaluarEntorno() {
    const ua = navigator.userAgent;
    const isInstagram = /Instagram|FBAN|FBAV/i.test(ua);
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (!estaEnApp()) {
      document.getElementById('gateOverlay').classList.remove('oculto');
      const box = document.getElementById('instrucciones');
      
      if (isInstagram) {
        box.innerHTML = `<span class="alerta-ig">Estás en el navegador de Instagram</span>
                         <ol>
                           <li>Tocá los <strong>tres puntos (⋮ o ···)</strong> arriba a la derecha.</li>
                           <li>Elegí <strong>Abrir en el navegador</strong> (Chrome o Safari).</li>
                           <li>Seguí los pasos en el nuevo navegador.</li>
                         </ol>`;
      } else if (isIOS) {
        box.innerHTML = `<ol>
                           <li>Tocá el botón <strong>Compartir</strong> abajo en Safari.</li>
                           <li>Seleccioná <strong>Agregar a inicio</strong>.</li>
                           <li>Abrí la nueva app desde tu pantalla.</li>
                         </ol>`;
      } else {
        box.innerHTML = `<ol>
                           <li>Tocá los <strong>tres puntos (⋮)</strong> arriba a la derecha en Chrome.</li>
                           <li>Seleccioná <strong>Instalar aplicación</strong> o <strong>Agregar a inicio</strong>.</li>
                           <li>Abrí la app desde tu menú de celular.</li>
                         </ol>`;
      }
    } else {
      document.getElementById('appContent').classList.remove('oculto');
      iniciarSistema();
    }
  }

  // Ejecutar validación de seguridad al instante
  evaluarEntorno();

  function iniciarSistema() {
    // ACTUALIZACIÓN AUTOMÁTICA SILENCIOSA (Service Worker)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then((reg) => {
        reg.onupdatefound = () => {
          const installingWorker = reg.installing;
          installingWorker.onstatechange = () => {
            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload(); // Fuerza recarga si hay actualización
            }
          };
        };
      });
    }

    const carrusel = document.getElementById('carrusel');
    const selectTorneo = document.getElementById('torneo');
    const contPartidos = document.getElementById('partidos');
    const btnEnviar = document.getElementById('enviar');

    // Carga de datos
    fetch(SCRIPT_URL + '?format=json')
      .then(r => r.json())
      .then(data => {
        const torneos = data.torneos || [];
        selectTorneo.innerHTML = '<option value="">Elegí un torneo...</option>' +
          torneos.map(t => `<option value="${t.nombre}">${t.nombre} (${formatoARS(t.costo)})</option>`).join('');

        carrusel.innerHTML = torneos.map(t => {
          return `<div class="pozo-slide" onclick="document.getElementById('torneo').value='${t.nombre}'; document.getElementById('torneo').dispatchEvent(new Event('change'));">
            <div class="pozo-slide-liga">🏆 ${t.nombre}</div>
            <div class="pozo-slide-monto">${formatoARS(t.pozo)}</div>
            <div class="pozo-slide-cta">Jugar por ${formatoARS(t.costo)} →</div>
          </div>`;
        }).join('');
      });

    // Selección de torneo
    selectTorneo.addEventListener('change', function(ev) {
      const torneo = ev.target.value;
      contPartidos.innerHTML = ''; btnEnviar.classList.add('oculto');
      document.getElementById('desempate-cont').classList.add('oculto');
      if (!torneo) return;

      fetch(SCRIPT_URL + '?format=partidos-torneo&torneo=' + encodeURIComponent(torneo))
        .then(r => r.json())
        .then(partidos => {
          if(partidos.length === 0) return;
          partidos.forEach(p => {
            const div = document.createElement('div'); div.className = 'partido-card';
            div.dataset.id = p.id; div.dataset.local = p.local; div.dataset.visitante = p.visitante;
            div.innerHTML = `<div class="equipo"><span>${p.local}</span></div>
                             <div class="marcador"><input type="number" min="0" class="gl"><span class="vs">vs</span><input type="number" min="0" class="gv"></div>
                             <div class="equipo"><span>${p.visitante}</span></div>`;
            contPartidos.appendChild(div);
          });
          document.getElementById('desempate-cont').classList.remove('oculto');
          btnEnviar.classList.remove('oculto');
        });
    });

    // Envío de jugada
    btnEnviar.addEventListener('click', function() {
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const torneo = selectTorneo.value;
      const desempate = document.getElementById('desempate').value;
      const estadoDiv = document.getElementById('estado');

      if (!nombre || !email || !torneo) { estadoDiv.textContent = 'Completá tus datos.'; return; }

      const predicciones = []; let falta = false;
      document.querySelectorAll('.partido-card').forEach(card => {
        const gl = card.querySelector('.gl').value; const gv = card.querySelector('.gv').value;
        if (gl === '' || gv === '') falta = true;
        predicciones.push({ id: card.dataset.id, local: card.dataset.local, visitante: card.dataset.visitante, golLocal: gl, golVisitante: gv });
      });

      if (falta) { estadoDiv.textContent = 'Completá todos los resultados.'; return; }

      btnEnviar.disabled = true; btnEnviar.textContent = 'PROCESANDO...'; estadoDiv.textContent = '';

      fetch(SCRIPT_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ nombre, email, torneo, desempate, predicciones })
      })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          const msj = encodeURIComponent(`Hola, envío mi jugada para ${torneo}. Jugador: ${nombre}.`);
          document.getElementById('wpLink').href = `https://wa.me/${WHATSAPP_NUMERO}?text=${msj}`;
          document.getElementById('modalAlias').textContent = ALIAS_PAGO;
          document.getElementById('pagoModal').style.display = 'flex';
        } else {
          estadoDiv.textContent = 'Error al enviar.';
          btnEnviar.disabled = false; btnEnviar.textContent = 'Confirmar Jugada';
        }
      });
    });
  }
</script>
</body>
</html>
